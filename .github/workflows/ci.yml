name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore
        run: dotnet restore ClashSharp\ClashSharp.slnx -p:Platform=x64

      - name: Check .NET formatting
        run: dotnet format ClashSharp\ClashSharp.slnx --verify-no-changes --verbosity minimal

      - name: Audit app NuGet packages
        run: dotnet list ClashSharp\ClashSharp\ClashSharp.csproj package --vulnerable --include-transitive

      - name: Audit test NuGet packages
        run: dotnet list ClashSharp\ClashSharp.Tests\ClashSharp.Tests.csproj package --vulnerable --include-transitive

      - name: Build
        run: dotnet build ClashSharp\ClashSharp.slnx -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test ClashSharp\ClashSharp.Tests\ClashSharp.Tests.csproj -p:Platform=x64 --no-build

      - name: Check Rust formatting
        working-directory: ClashSharp\Installer
        run: cargo fmt --check

      - name: Check installer
        working-directory: ClashSharp\Installer
        run: cargo check
